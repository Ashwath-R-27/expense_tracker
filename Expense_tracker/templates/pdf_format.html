<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        *{
            --color--log: #a41bff;
            --color-txt: #2b2525;
            --color-entrylbl: #0c4620;
            --row-even: #fff8ec;
            --row-odd: #ffffff;
            --table-header: rgb(151, 78, 18);
        }

        body{
            margin: 0;
            font-family: sans-serif;
        }

        .header {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--color--log);
            color: white;
            padding: 5px;
        }

        .header h2 {
            padding-left: 3%;
            font-weight: bold;
        }

        .content {
            padding: 2%;
        }

        .table {
            width: 97%;
            margin-top: 10px;
            margin-right: auto;
            margin-left: auto;
        }

        .table table {
            width: 100%;
            margin-right: auto;
            margin-left: auto;
            border-collapse: collapse;
        }

        .table table thead th {
            color: white;
            background-color: var(--table-header);
        }

        .table table td, .table table th {
            border: 1px solid black;
            text-align: center;
            font-size: 11px;
            color: var(--color-txt);
            font-weight: bold;
            height: 15px;
        }

        .table table tr:nth-child(even){
            background-color: var(--row-even);
        }

        .table table tr:nth-child(odd){
            background-color: var(--row-odd);
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>EXPENSE TRACKER</h2>
    </div>
    <div class="content">
        <h3 style="text-align: center;color: rgb(255, 72, 0);text-shadow: 1px 1px black;">STATEMENT</h3>
        <div class="table">
            <table>
                <thead>
                    <tr style="height: 30px;">
                        <th>DATE</th>
                        <th>ITEM</th>
                        <th style="width: 20%;">SHOP NAME</th>
                        <th>CATEGORY</th>
                        <th>MODE OF PAYMENT</th>
                        <th>AMOUNT</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in records %}
                    <tr>
                        <td>{{ i[0] }}</td>
                        <td>{{ i[1] }}</td>
                        <td style="width: 20%;">{{ i[2] }}</td>
                        <td>{{ i[3] }}</td>
                        <td>{{ i[4] }}</td>
                        <td>₹ {{ i[5] }}</td>
                    </tr>
                    {% endfor %}
                    <tr style="height: 36px;">
                        <td colspan="5" style="text-align: right; padding-right: 20px;font-size: 14px;background-color: var(--row-odd);">TOTAL :</td>
                        <td style="font-size: 14px;background-color: var(--row-odd);">₹ {{ total }}</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <hr style="margin-top: 30px;">
        <div class="compcont">
            <div class="catcomp">
                <h3 style="text-align: center; color: var(--table-header);">Category wise Comparison</h3>
                <div id="barChart" class="chart-box"></div>
            </div>
        <hr>
            <div class="paycomp">
                <h3 style="text-align: center;color: var(--table-header);">Mode of Payment</h3>
                <div id="pieChart" class="chart-box"></div>
            </div>
        </div>
    </div>
    <script>
        window.labels = {{ labels | tojson | safe }};
        window.values = {{ values | tojson | safe }};
        window.pay_labels = {{ pay_labels | tojson | safe }};
        window.pay_values = {{ pay_values | tojson | safe }};
    </script>
<script src="{{ url_for('static', filename='stats.js') }}"></script>
</body>
</html>
