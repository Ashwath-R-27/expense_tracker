<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static',filename='entrypg.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Entry</title>
</head>
<script>
let expenseCount = 1;

function addExpense() {
    expenseCount++;

    const container = document.getElementById("entries");
    const firstEntry = document.querySelector(".entry");

    const newEntry = firstEntry.cloneNode(true);

    // Change title
    newEntry.querySelector(".exp-title").innerText = "EXPENSE " + expenseCount;

    // Clear values
    newEntry.querySelectorAll("input").forEach(input => {
        if (input.type !== "date") {
            input.value = "";
        }
    });

    newEntry.querySelectorAll("select").forEach(select => {
        select.selectedIndex = 0;
    });

    // Show remove button
    const removeBtn = newEntry.querySelector(".remove-btn");
    removeBtn.style.display = "inline-block";

    // Add animation class
    newEntry.classList.add("entry-animate");

    container.appendChild(newEntry);

    // Scroll smoothly to the new expense
    newEntry.scrollIntoView({
        behavior: "smooth",
        block: "center"
    });
}

function removeExpense(button) {
    const entry = button.closest(".entry");
    entry.remove();
    renumberExpenses();
}

function renumberExpenses() {
    const entries = document.querySelectorAll(".entry");
    expenseCount = entries.length;

    entries.forEach((entry, index) => {
        entry.querySelector(".exp-title").innerText = "EXPENSE " + (index + 1);

        const removeBtn = entry.querySelector(".remove-btn");

        if (index === 0) {
            removeBtn.style.display = "none";
        } else {
            removeBtn.style.display = "inline-block";
        }
    });
}
</script>
<body>
    <div class="header">
        <h2>EXPENSE TRACKER</h2>
    </div>
    <div class="box">
        <div class="entcon">
            <datalist id="expense-types">
                                <option value="Groceries">
                                <option value="ATM Withdrawal">
                                <option value="Internet Banking"></option>
                                <option value="Petrol / Fuel">
                                <option value="Transport">
                                <option value="Taxi / Auto">
                                <option value="Bus / Train">
                                <option value="Snacks">
                                <option value="Tea / Coffee">
                                <option value="Meat(Chicken/Mutton/Fish)">
                                <option value="Online Shopping">
                                <option value="Clothing">
                                <option value="Electronics">
                                <option value="Mobile Recharge">
                                <option value="Internet Bill">
                                <option value="Electricity Bill">
                                <option value="Water Bill">
                                <option value="Rent">
                                <option value="Medical / Pharmacy">
                                <option value="Hospital">
                                <option value="Education">
                                <option value="Stationery">
                                <option value="Entertainment">
                                <option value="Movie">
                                <option value="Subscription">
                                <option value="Travel">
                                <option value="Hotel">
                                <option value="Gift">
                                <option value="Personal Care">
                                <option value="Gym / Fitness">
                                <option value="Maintenance">
                                <option value="Other">
                            </datalist>
            <form method="POST" action="/submit_expenses">
                <div id="entries">
                    <div class="entry">
                        <div class="expense-head">
                            <h3 class="exp-title">EXPENSE 1</h3>
                            <button type="button" class="remove-btn" onclick="removeExpense(this)" style="display:none;">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                        <hr style="margin-top: 10px;">
                        <div class="input-box">
                            <label>Enter the Item:</label><br>
                            <input type="text" name="item[]" placeholder="Item name" required>
                        </div>

                        <div class="input-box">
                            <label>Enter Shop / Organisation Name:</label><br>
                            <input type="text" name="shop[]" placeholder="Shop name" required>
                        </div>

                        <div class="input-box">
                            <label>Type:</label><br>
                            <input type="text" list="expense-types" name="type[]" placeholder="Select or type a category" required>
                        </div>

                        <div class="amt-input">
                            <label>Enter the amount:</label><br>
                            <table>
                                <tr>
                                    <th>₹</th>
                                    <th><input type="number" name="amount[]" step="0.01" min="1" required></th>
                                </tr>
                            </table>
                        </div>

                        <div class="sedte">
                            <div class="se">
                                <label>Mode of Payment:</label>
                                <select name="mode[]" required>
                                    <option value="" selected disabled>Select</option>
                                    <option value="Cash">Cash</option>
                                    <option value="Gpay/Debit Card">Gpay / Debit Card</option>
                                    <option value="Credit Card">Credit Card</option>
                                </select>
                            </div>

                            <div class="dt">
                                <label>Select the Date:</label>
                                <input type="date" name="date[]" min="{{ least }}" max="{{ present }}" value="{{ present }}" required>
                            </div>
                        </div>
                        <hr style="border: 1px solid #632533; margin-top: 20px;">
                    </div>
                </div>

                <!-- Add Expense Button -->
                <div class="add-btn">
                    <button type="button" onclick="addExpense()">Add Another Expense</button>
                </div>

                <hr style="border: 1px solid yellowgreen;">
                <div class="submit-btn">
                    <button type="submit">Submit All Expenses</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
